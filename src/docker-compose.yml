name: ai-gateway

services:
  sticky-router:
    build:
      context: ./router
    container_name: ai-gateway-router
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LITELLM_BASE_URL: http://litellm:4000
      REDIS_URL: ${REDIS_URL}
      USAGE_LEDGER_URL: http://usage-ledger:4200
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "4100:4100"
    depends_on:
      litellm:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:4100/healthz')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  litellm:
    image: ghcr.io/berriai/litellm-database:latest
    container_name: ai-gateway-litellm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STORE_MODEL_IN_DB: "True"
      REDIS_URL: ${REDIS_URL}
      PYTHONPATH: /app
    command:
      - "--config=/app/config.yaml"
      - "--port=4000"
    expose:
      - "4000"
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
      - ./litellm_logging/custom_logger.py:/app/custom_logger.py:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G

  postgres:
    image: postgres:16-alpine
    container_name: ai-gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d "$$POSTGRES_DB" -U "$$POSTGRES_USER"
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    restart: unless-stopped
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 10

  usage-ledger:
    build:
      context: ./ledger
    container_name: ai-gateway-usage-ledger
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "4200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:4200/healthz')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
