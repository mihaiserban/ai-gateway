# Human-edited source of truth for the personal AI gateway.
# Run `python3 src/scripts/generate_configs.py` after editing this file.
#
# Shape (Task 1 of the provider-connections rebuild):
#   router      -> gateway runtime knobs (default model, cache, retry, quota)
#   providers   -> adapter + registry of model metadata, keyed by provider id
#   connections -> enabled/disabled upstream groups keyed by connection id
#   combos      -> curated public models keyed by combo id (share /v1/models namespace with registry model ids)
#   clients     -> downstream client setup targets (used by Task 5)
#   litellm     -> LiteLLM runtime settings/cache/general/logging (kept for Task 2 generator)

router:
  default_model: coder
  cache_ttl_seconds: 600
  retry_base_delay: 0.2
  retry_max_delay: 2.0
  quota_cooldown_seconds: 300

providers:
  ollama:
    adapter: litellm
    litellm_model_prefix: ollama_chat
    api_base_env: OLLAMA_API_BASE
    api_key_env: OLLAMA_API_KEY
    registry:
      models:
        deepseek-v4-flash:
          display_name: DeepSeek V4 Flash
          capabilities: [chat, coding, fast]
          context_length: 128000
        glm-5.2:
          display_name: GLM 5.2
          capabilities: [chat, coding, reasoning]
          context_length: 128000
        kimi-k2.7-code:
          display_name: Kimi K2.7 Code
          capabilities: [chat, coding]
          context_length: 128000
        deepseek-v4-pro:
          display_name: DeepSeek V4 Pro
          capabilities: [chat, coding, reasoning]
          context_length: 128000
        kimi-k2.6:
          display_name: Kimi K2.6
          capabilities: [chat, coding, fast]
          context_length: 128000

  deepseek:
    adapter: litellm
    litellm_model_prefix: deepseek
    api_key_env: DEEPSEEK_API_KEY
    registry:
      models:
        deepseek-v4-flash:
          display_name: DeepSeek V4 Flash
          capabilities: [chat, coding, fast]
          context_length: 128000
          pricing:
            input_cost_per_token: 0.00000014
            output_cost_per_token: 0.00000028
        deepseek-v4-pro:
          display_name: DeepSeek V4 Pro
          capabilities: [chat, coding, reasoning]
          context_length: 128000
          pricing:
            input_cost_per_token: 0.00000028
            output_cost_per_token: 0.00000056

  opencode-go:
    adapter: litellm
    litellm_model_prefix: openai
    api_base_env: OPENCODE_GO_API_BASE
    api_key_env: OPENCODE_GO_API_KEY
    drop_params:
      - reasoningSummary
    registry:
      models:
        deepseek-v4-flash:
          display_name: DeepSeek V4 Flash
          capabilities: [chat, coding, fast]
          context_length: 128000
        glm-5.2:
          display_name: GLM 5.2
          capabilities: [chat, coding, reasoning]
          context_length: 128000
        kimi-k2.7-code:
          display_name: Kimi K2.7 Code
          capabilities: [chat, coding]
          context_length: 128000
        kimi-k2.6:
          display_name: Kimi K2.6
          capabilities: [chat, coding, fast]
          context_length: 128000

connections:
  ollama-cloud:
    provider: ollama
    enabled: true
    priority: 10
    stability: 0.85
    max_concurrent: 8
    models: all

  deepseek-api:
    provider: deepseek
    enabled: true
    priority: 30
    stability: 0.9
    max_concurrent: 20
    models:
      - deepseek-v4-flash
      - deepseek-v4-pro

  opencode-go:
    provider: opencode-go
    enabled: true
    priority: 40
    stability: 0.7
    max_concurrent: 8
    models: all

combos:
  explorer:
    task: explore
    strategy: score
    candidates:
      - connection: ollama-cloud
        model: deepseek-v4-flash
      - connection: deepseek-api
        model: deepseek-v4-flash
      - connection: opencode-go
        model: deepseek-v4-flash
    scoring:
      health: 0.30
      latency: 0.20
      quota: 0.15
      stability: 0.15
      connection_density: 0.10
      priority: 0.10

  planner:
    task: plan
    strategy: score
    candidates:
      - connection: ollama-cloud
        model: glm-5.2
      - connection: opencode-go
        model: glm-5.2
      - connection: deepseek-api
        model: deepseek-v4-pro
      - connection: opencode-go
        model: kimi-k2.7-code
    scoring:
      health: 0.30
      latency: 0.20
      quota: 0.15
      stability: 0.15
      connection_density: 0.10
      priority: 0.10

  coder:
    task: build
    strategy: score
    candidates:
      - connection: ollama-cloud
        model: kimi-k2.7-code
      - connection: deepseek-api
        model: deepseek-v4-pro
      - connection: opencode-go
        model: kimi-k2.7-code
    scoring:
      health: 0.30
      latency: 0.20
      quota: 0.15
      stability: 0.15
      connection_density: 0.10
      priority: 0.10
    tiers:
      fast:
        task: quick-build
        candidates:
          - connection: ollama-cloud
            model: deepseek-v4-flash
          - connection: deepseek-api
            model: deepseek-v4-flash
          - connection: opencode-go
            model: deepseek-v4-flash
          - connection: opencode-go
            model: kimi-k2.6
        scoring:
          health: 0.30
          latency: 0.20
          quota: 0.15
          stability: 0.15
          connection_density: 0.10
          priority: 0.10

  vision:
    task: vision
    strategy: score
    candidates:
      - connection: ollama-cloud
        model: kimi-k2.6
      - connection: opencode-go
        model: kimi-k2.6
    scoring:
      health: 0.30
      latency: 0.20
      quota: 0.15
      stability: 0.15
      connection_density: 0.10
      priority: 0.10

clients:
  base_url: http://localhost:4100/v1
  api_key_env: VIRTUAL_KEY
  default_model: coder
  default_catalog: all
  targets:
    codex:
      model: coder
      catalog: all
      paths:
        - ~/.codex/config.toml
        - ~/.codex/codex.toml
    claude-code:
      model: coder
      catalog: all
      paths:
        - ~/.claude/settings.json
    opencode:
      model: coder
      small_model: coder:fast
      catalog: all
      mode: local-plugin
      provider_id: gateway
      plugin_dir: ~/.config/opencode/plugins/agent-ai-gateway
      model_cache_ttl_ms: 300000
      paths:
        - ~/.config/opencode/opencode.json
    pi:
      model: coder
      catalog: all
      paths:
        - ~/.config/pi/settings.json

litellm:
  settings:
    drop_params: true
    request_timeout: 120
    num_retries: 3
  cache:
    type: redis
    redis_url_env: REDIS_URL
  general:
    master_key_env: LITELLM_MASTER_KEY
    database_url_env: DATABASE_URL
  logging:
    callbacks:
      - custom_logger.ProviderModelLogger
