# Human-edited source of truth for the personal AI gateway.
# Run `python3 src/scripts/generate_configs.py` after editing this file.

router:
  cache_ttl_seconds: 600
  default_model: coder
  retry_base_delay: 0.2
  retry_max_delay: 2.0
  max_concurrent_upstream: 50
  # Providers that support prompt_cache_key: openai, deepseek, anthropic; not ollama.
  cache_key_aliases: []

litellm:
  settings:
    drop_params: true
    request_timeout: 120
    num_retries: 3
    max_parallel_requests: 100
  cache:
    type: redis
    redis_url_env: REDIS_URL
  general:
    master_key_env: LITELLM_MASTER_KEY
    database_url_env: DATABASE_URL
  logging:
    callbacks:
      - custom_logger.ProviderModelLogger

models:
  - name: deepseek-v4-flash-ollama
    litellm_model: ollama_chat/deepseek-v4-flash
    api_base_env: OLLAMA_API_BASE
    api_key_env: OLLAMA_API_KEY
    timeout: 60
    model_info:
      role: provider-deployment
      family: deepseek-v4-flash
      provider: ollama
      reasoning_level: low
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - name: deepseek-v4-flash-deepseek
    litellm_model: deepseek/deepseek-v4-flash
    api_key_env: DEEPSEEK_API_KEY
    timeout: 60
    model_info:
      role: provider-deployment
      family: deepseek-v4-flash
      provider: deepseek
      reasoning_level: low
      input_cost_per_token: 0.00000014
      output_cost_per_token: 0.00000028

  - name: deepseek-v4-flash-opencodego
    litellm_model: openai/deepseek-v4-flash
    api_base_env: OPENCODE_GO_API_BASE
    api_key_env: OPENCODE_GO_API_KEY
    timeout: 60
    additional_drop_params:
      - reasoningSummary
    model_info:
      role: provider-deployment
      family: deepseek-v4-flash
      provider: opencodego
      reasoning_level: low
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - name: glm-5.2-ollama
    litellm_model: ollama_chat/glm-5.2
    api_base_env: OLLAMA_API_BASE
    api_key_env: OLLAMA_API_KEY
    timeout: 120
    model_info:
      role: provider-deployment
      family: glm-5.2
      provider: ollama
      reasoning_level: high
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - name: glm-5.2-opencodego
    litellm_model: openai/glm-5.2
    api_base_env: OPENCODE_GO_API_BASE
    api_key_env: OPENCODE_GO_API_KEY
    timeout: 120
    additional_drop_params:
      - reasoningSummary
    model_info:
      role: provider-deployment
      family: glm-5.2
      provider: opencodego
      reasoning_level: high
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - name: kimi-k2.7-code-ollama
    litellm_model: ollama_chat/kimi-k2.7-code
    api_base_env: OLLAMA_API_BASE
    api_key_env: OLLAMA_API_KEY
    timeout: 120
    model_info:
      role: provider-deployment
      family: kimi-k2.7-code
      provider: ollama
      reasoning_level: medium
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - name: kimi-k2.7-code-opencodego
    litellm_model: openai/kimi-k2.7-code
    api_base_env: OPENCODE_GO_API_BASE
    api_key_env: OPENCODE_GO_API_KEY
    timeout: 120
    additional_drop_params:
      - reasoningSummary
    model_info:
      role: provider-deployment
      family: kimi-k2.7-code
      provider: opencodego
      reasoning_level: medium
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - name: deepseek-v4-pro-ollama
    litellm_model: ollama_chat/deepseek-v4-pro
    api_base_env: OLLAMA_API_BASE
    api_key_env: OLLAMA_API_KEY
    timeout: 120
    model_info:
      role: provider-deployment
      family: deepseek-v4-pro
      provider: ollama
      reasoning_level: high
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - name: deepseek-v4-pro-deepseek
    litellm_model: deepseek/deepseek-v4-pro
    api_key_env: DEEPSEEK_API_KEY
    timeout: 120
    model_info:
      role: provider-deployment
      family: deepseek-v4-pro
      provider: deepseek
      reasoning_level: high
      input_cost_per_token: 0.00000028
      output_cost_per_token: 0.00000056

  - name: kimi-k2.6-ollama
    litellm_model: ollama_chat/kimi-k2.6
    api_base_env: OLLAMA_API_BASE
    api_key_env: OLLAMA_API_KEY
    timeout: 60
    model_info:
      role: provider-deployment
      family: kimi-k2.6
      provider: ollama
      reasoning_level: low
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - name: kimi-k2.6-opencodego
    litellm_model: openai/kimi-k2.6
    api_base_env: OPENCODE_GO_API_BASE
    api_key_env: OPENCODE_GO_API_KEY
    timeout: 120
    additional_drop_params:
      - reasoningSummary
    model_info:
      role: provider-deployment
      family: kimi-k2.6
      provider: opencodego
      reasoning_level: low
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

aliases:
  - name: deepseek-v4-flash
    target: deepseek-v4-flash-ollama
    timeout: 60
    fallbacks:
      - deepseek-v4-flash-deepseek
      - deepseek-v4-flash-opencodego
    model_info:
      role: model-family
      family: deepseek-v4-flash
      reasoning_level: low

  - name: glm-5.2
    target: glm-5.2-ollama
    timeout: 120
    fallbacks:
      - glm-5.2-opencodego
      - kimi-k2.7-code-opencodego
    model_info:
      role: model-family
      family: glm-5.2
      reasoning_level: high

  - name: kimi-k2.7-code
    target: kimi-k2.7-code-ollama
    timeout: 120
    fallbacks:
      - kimi-k2.7-code-opencodego
      - deepseek-v4-pro-deepseek
    model_info:
      role: model-family
      family: kimi-k2.7-code
      reasoning_level: medium

  - name: deepseek-v4-pro
    target: deepseek-v4-pro-ollama
    timeout: 120
    fallbacks:
      - deepseek-v4-pro-deepseek
    model_info:
      role: model-family
      family: deepseek-v4-pro
      reasoning_level: high

  - name: kimi-k2.6
    target: kimi-k2.6-ollama
    timeout: 60
    fallbacks:
      - kimi-k2.6-opencodego
    model_info:
      role: model-family
      family: kimi-k2.6
      reasoning_level: low

  - name: explorer
    target: deepseek-v4-flash
    timeout: 60
    fallbacks:
      - deepseek-v4-flash-deepseek
      - deepseek-v4-flash-opencodego
    model_info:
      role: task-alias
      task: explore
      reasoning_level: low

  - name: planner
    target: glm-5.2
    timeout: 120
    fallbacks:
      - glm-5.2-opencodego
      - deepseek-v4-pro-deepseek
      - kimi-k2.7-code-opencodego
    model_info:
      role: task-alias
      task: plan
      reasoning_level: high

  - name: coder
    target: kimi-k2.7-code
    timeout: 120
    fallbacks:
      - kimi-k2.7-code-opencodego
      - deepseek-v4-pro-deepseek
    model_info:
      role: task-alias
      task: build
      reasoning_level: medium

  - name: coder-fast
    target: deepseek-v4-flash
    timeout: 60
    fallbacks:
      - deepseek-v4-flash-deepseek
      - deepseek-v4-flash-opencodego
      - kimi-k2.6-opencodego
    model_info:
      role: task-alias
      task: quick-build
      reasoning_level: low

  - name: vision
    target: kimi-k2.6
    timeout: 120
    fallbacks:
      - kimi-k2.6-opencodego
    model_info:
      role: task-alias
      task: vision
      reasoning_level: medium
