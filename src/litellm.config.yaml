# LiteLLM AI Gateway config for Synology Docker.
# Provider secrets are loaded from .env with os.environ/VARIABLE.

model_list:
  - model_name: fast
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      # approximate; DeepSeek V4 flash cache miss pricing, per token
      input_cost_per_token: 0.00000014
      output_cost_per_token: 0.00000028

  - model_name: deepseek-pro
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      # approximate; DeepSeek V4 pro is ~2x flash, per token
      input_cost_per_token: 0.00000028
      output_cost_per_token: 0.00000056

  - model_name: opencodego-fast
    litellm_params:
      model: openai/kimi-k2.7-code
      api_base: os.environ/OPENCODE_GO_API_BASE
      api_key: os.environ/OPENCODE_GO_API_KEY
      additional_drop_params:
        - reasoningSummary
    model_info:
      # OpenCode Go is subscription-based; per-token cost not published
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: opencodego-code
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: os.environ/OPENCODE_GO_API_BASE
      api_key: os.environ/OPENCODE_GO_API_KEY
      additional_drop_params:
        - reasoningSummary
    model_info:
      # OpenCode Go is subscription-based; per-token cost not published
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: ollama-cloud
    litellm_params:
      model: ollama_chat/gemma3:27b
      api_base: os.environ/OLLAMA_API_BASE
      api_key: os.environ/OLLAMA_API_KEY
    model_info:
      # Ollama Cloud gemma3:27b pricing unknown/free tier; approximate
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

litellm_settings:
  drop_params: true
  request_timeout: 120
  num_retries: 1
  cache: true
  cache_params:
    type: redis
    redis_url: os.environ/REDIS_URL

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

router_settings:
  fallbacks:
    - fast:
        - ollama-cloud
    - deepseek-pro:
        - opencodego-code
        - fast
    - opencodego-fast:
        - fast
        - deepseek-pro
    - opencodego-code:
        - deepseek-pro
        - fast
    - ollama-cloud:
        - fast
