litellm_settings:
  drop_params: true
  request_timeout: 120
  num_retries: 3
  cache: true
  cache_params:
    type: redis
    redis_url: os.environ/REDIS_URL
  callbacks:
  - custom_logger.ProviderModelLogger
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
